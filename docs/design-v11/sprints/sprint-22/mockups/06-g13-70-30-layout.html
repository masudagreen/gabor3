<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>S22-G13-PLAY — G-13 数字探し (上 70% 刺激 / 下 30% keypad)</title>
<style>
  :root {
    --bg-canvas: #0F1115;
    --gabor-bg: #808080;
    --fg-primary: #FFFFFF;
    --fg-muted: #B7BCC9;
    --countdown-normal: #FFFFFF;
    --selection-subtle: rgba(220, 224, 232, 0.55);
    --selection-idle: rgba(220, 224, 232, 0.30);
    --action-secondary: #2A2D34;
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-canvas);
    color: var(--fg-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    -webkit-font-smoothing: antialiased;
    box-sizing: border-box;
  }
  *, *::before, *::after { box-sizing: inherit; }
  .device {
    max-width: 375px; width: 100%; height: 812px;
    margin: 24px auto;
    background: var(--gabor-bg);
    border-radius: 32px; overflow: hidden;
    border: 1px solid #2A2D34;
    display: flex; flex-direction: column;
    position: relative;
  }
  .statusbar {
    flex: 0 0 88px;
    background: rgba(26, 29, 36, 0.85);
    display: flex; align-items: flex-end; justify-content: space-between;
    padding: 16px 16px 12px 16px;
  }
  .close { width: 48px; height: 48px; background: transparent; border: none; color: var(--fg-primary); font-size: 28px; }
  .countdown { font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--fg-primary); }
  .placeholder { width: 48px; }
  /* 残りスペース (812 - 88 = 724) を 70/30 で正確に分割。
     keypad の padding を内包してもなお 30% に収まるよう、
     keypad 側を min-height ベースで制御する */
  .play-area {
    flex: 1 1 auto; display: flex; flex-direction: column;
    min-height: 0;
  }
  .stim-area {
    flex: 7 1 0;             /* 70% */
    background: var(--gabor-bg);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .noise {
    width: 100%; height: 100%;
    position: relative;
    overflow: hidden;
  }
  .noise svg { display: block; width: 100%; height: 100%; }
  .keypad-area {
    flex: 3 1 0;             /* 30% */
    background: #1A1D24;
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 8px;
    min-height: 0;
  }
  .key {
    background: var(--action-secondary);
    border: 1px solid var(--selection-idle);
    border-radius: 12px;
    color: var(--fg-primary);
    font-size: 26px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    min-height: 0;
  }
  .key.selected {
    box-shadow: inset 0 0 0 2px var(--selection-subtle);
    font-weight: 900;
  }
  .key:focus-visible {
    outline: 3px solid #FFFFFF;
    outline-offset: 2px;
  }
  .label-pc {
    text-align: center; color: var(--fg-muted); font-size: 14px; margin: 16px 24px;
  }
  .number-7 {
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 220px;
    font-weight: 900;
    color: rgba(120, 120, 120, 0.35);
    font-family: -apple-system, sans-serif;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>

<div class="label-pc">S22-G13-PLAY — G-13 数字探し（上 70% 刺激 / 下 30% keypad、A4 確定。padding 内包で実 70/30 厳守）</div>
<div class="device" role="region" aria-label="G-13 数字探し プレイ画面">
  <div class="statusbar">
    <button class="close" aria-label="ゲームを中断">×</button>
    <div class="countdown" role="timer" aria-live="polite">47</div>
    <div class="placeholder"></div>
  </div>
  <div class="play-area">
    <div class="stim-area" id="stim-area" aria-label="ノイズ + 埋め込み数字">
      <div class="noise">
        <svg viewBox="0 0 360 360" preserveAspectRatio="xMidYMid meet">
          <defs>
            <pattern id="noise-pat" width="36" height="36" patternUnits="userSpaceOnUse">
              <rect width="36" height="36" fill="#808080"/>
              <rect x="0" y="0" width="18" height="36" fill="#404040"/>
            </pattern>
            <pattern id="noise2" width="22" height="22" patternUnits="userSpaceOnUse">
              <rect width="22" height="22" fill="transparent"/>
              <rect x="11" y="0" width="11" height="22" fill="#a0a0a0"/>
            </pattern>
          </defs>
          <rect x="0" y="0" width="360" height="360" fill="url(#noise-pat)"/>
          <g transform="rotate(30 180 180)" opacity="0.7">
            <rect x="0" y="0" width="360" height="360" fill="url(#noise2)"/>
          </g>
        </svg>
        <div class="number-7" aria-hidden="true">7</div>
      </div>
    </div>
    <div class="keypad-area" role="radiogroup" aria-label="数字選択 0-9">
      <button class="key" data-target-id="g13-key-1" role="radio" aria-checked="false" aria-label="数字 1">1</button>
      <button class="key" data-target-id="g13-key-2" role="radio" aria-checked="false" aria-label="数字 2">2</button>
      <button class="key" data-target-id="g13-key-3" role="radio" aria-checked="false" aria-label="数字 3">3</button>
      <button class="key" data-target-id="g13-key-4" role="radio" aria-checked="false" aria-label="数字 4">4</button>
      <button class="key" data-target-id="g13-key-5" role="radio" aria-checked="false" aria-label="数字 5">5</button>
      <button class="key" data-target-id="g13-key-6" role="radio" aria-checked="false" aria-label="数字 6">6</button>
      <button class="key selected" data-target-id="g13-key-7" role="radio" aria-checked="true" aria-label="数字 7">7</button>
      <button class="key" data-target-id="g13-key-8" role="radio" aria-checked="false" aria-label="数字 8">8</button>
      <button class="key" data-target-id="g13-key-9" role="radio" aria-checked="false" aria-label="数字 9">9</button>
      <button class="key" data-target-id="g13-key-0" role="radio" aria-checked="false" aria-label="数字 0">0</button>
    </div>
  </div>
</div>

</body>
</html>
