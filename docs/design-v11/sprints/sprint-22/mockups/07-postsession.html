<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>S22-POSTSESSION — F-21 連続プレイ事後画面 (v1.2 新規)</title>
<style>
  :root {
    --bg-canvas: #0F1115;
    --bg-surface: #1A1D24;
    --bg-elevated: #2A2D34;
    --fg-primary: #FFFFFF;
    --fg-secondary: #DCE0E8;
    --fg-muted: #B7BCC9;
    --action-primary: #13449D;     /* token-aligned */
    --action-secondary: #2A2D34;
    --action-tertiary: transparent;
    --result-success: #0A6238;     /* v1.2 amendment: 暗緑で 7:1 確保 */
    --result-success-fg: #FFFFFF;  /* 7.45:1 on #0A6238 (AAA) */
    --result-danger:  #A82018;     /* v1.2 amendment: 暗赤で 7:1 確保 */
    --result-danger-fg: #FFFFFF;   /* 7.28:1 on #A82018 (AAA) */
    --border-default: #3A3F4A;
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-canvas);
    color: var(--fg-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    -webkit-font-smoothing: antialiased;
    box-sizing: border-box;
  }
  *, *::before, *::after { box-sizing: inherit; }
  .device {
    max-width: 375px; width: 100%; min-height: 812px;
    margin: 24px auto;
    background: var(--bg-canvas);
    border-radius: 32px; overflow: hidden;
    border: 1px solid #2A2D34;
  }
  .inner {
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0;
  }
  .logo { font-size: 22px; font-weight: 700; }
  .gear-btn {
    width: 56px; height: 56px;
    background: transparent; border: none; color: var(--fg-primary);
    font-size: 28px;
  }
  .score-section {
    text-align: center; padding: 16px 0 8px 0;
  }
  .score-label { font-size: 22px; color: var(--fg-muted); }
  .score-value {
    font-size: 72px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1; margin: 8px 0;
  }
  .score-of100 { font-size: 22px; color: var(--fg-muted); }
  .streak {
    text-align: center; font-size: 22px;
    margin: 16px 0 0 0;
  }
  .streak .icon { font-size: 26px; margin-right: 8px; }
  .divider {
    border: none; border-top: 1px solid var(--border-default);
    margin: 24px 0 16px 0;
  }
  .section-title {
    font-size: 20px; font-weight: 600; margin: 0 0 12px 0;
  }
  .game-list {
    display: block;
  }
  @media (min-width: 720px) {
    .device { max-width: 720px; }
    .game-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 24px;
    }
  }
  .game-row {
    display: flex; align-items: center;
    height: 60px; border-bottom: 1px solid var(--border-default);
    font-size: 20px;
  }
  .game-row .name { flex: 1; min-width: 0; }
  .game-row .badge {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900;
    margin: 0 16px;
    flex-shrink: 0;
  }
  .game-row .badge.ok { background: var(--result-success); color: var(--result-success-fg); }
  .game-row .badge.ng { background: var(--result-danger);  color: var(--result-danger-fg); }
  .game-row .threshold {
    font-variant-numeric: tabular-nums;
    color: var(--fg-secondary);
    font-size: 18px;
    min-width: 70px; text-align: right;
    flex-shrink: 0;
  }
  .nav-buttons {
    display: flex; flex-direction: column; gap: 12px;
    margin-top: 32px;
  }
  .btn {
    width: 100%; height: 64px; border-radius: 16px;
    font-size: 20px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    border: none; cursor: pointer;
    color: var(--fg-primary);
  }
  .btn .icon { margin-right: 12px; font-size: 22px; }
  .btn.primary { background: var(--action-primary); }
  .btn.secondary { background: var(--action-secondary); border: 1px solid var(--border-default); }
  .btn.tertiary { background: transparent; text-decoration: underline; font-weight: 500; }
  .btn:focus-visible { outline: 3px solid #FFFFFF; outline-offset: 2px; }
  .label-pc {
    text-align: center; color: var(--fg-muted); font-size: 14px; margin: 16px 24px;
  }
</style>
</head>
<body>

<div class="label-pc">S22-POSTSESSION — F-21 連続プレイ事後画面（v1.2 新規、ホーム的役割。1280px で 2 列展開）</div>
<div class="device" role="region" aria-labelledby="postsession-title">
  <div class="inner">
    <div class="header">
      <div class="logo" id="postsession-title">GaborEye</div>
      <button class="gear-btn" aria-label="設定">⚙</button>
    </div>
    <div class="score-section">
      <div class="score-label">今日のスコア</div>
      <div class="score-value" aria-label="今日のワイドスコアは 72 点（100 点満点）">72</div>
      <div class="score-of100">／100</div>
    </div>
    <div class="streak"><span class="icon" aria-hidden="true">🔥</span>5 日連続</div>

    <hr class="divider"/>
    <h2 class="section-title">各ゲームの結果</h2>

    <div class="game-list" role="list">
      <div class="game-row" role="listitem" aria-label="G-01 回転検出 正解 閾値 3.5 度毎秒">
        <div class="name">G-01 回転検出</div>
        <div class="badge ok" aria-hidden="true">✓</div>
        <div class="threshold">3.5°/s</div>
      </div>
      <div class="game-row" role="listitem" aria-label="G-03 周辺視野 不正解 閾値 12 度">
        <div class="name">G-03 周辺視野</div>
        <div class="badge ng" aria-hidden="true">✕</div>
        <div class="threshold">12°</div>
      </div>
      <div class="game-row" role="listitem" aria-label="G-04 コントラスト 正解 閾値 0.18">
        <div class="name">G-04 コントラスト</div>
        <div class="badge ok" aria-hidden="true">✓</div>
        <div class="threshold">0.18</div>
      </div>
      <div class="game-row" role="listitem" aria-label="G-05 空間周波数 正解 閾値 1.4 倍">
        <div class="name">G-05 空間周波数</div>
        <div class="badge ok" aria-hidden="true">✓</div>
        <div class="threshold">1.4×</div>
      </div>
      <div class="game-row" role="listitem" aria-label="G-06 窓サイズ 正解 閾値 1.4">
        <div class="name">G-06 窓サイズ</div>
        <div class="badge ok" aria-hidden="true">✓</div>
        <div class="threshold">1.4</div>
      </div>
      <div class="game-row" role="listitem" aria-label="G-07 向き同定 不正解 閾値 8 度">
        <div class="name">G-07 向き同定</div>
        <div class="badge ng" aria-hidden="true">✕</div>
        <div class="threshold">8°</div>
      </div>
      <div class="game-row" role="listitem" aria-label="G-13 数字探し 正解 閾値 0.12">
        <div class="name">G-13 数字探し</div>
        <div class="badge ok" aria-hidden="true">✓</div>
        <div class="threshold">0.12</div>
      </div>
    </div>

    <div class="nav-buttons">
      <button class="btn primary" aria-label="進捗グラフを見る"><span class="icon" aria-hidden="true">📊</span>進捗グラフを見る</button>
      <button class="btn secondary" aria-label="バッジを見る"><span class="icon" aria-hidden="true">🏅</span>バッジを見る</button>
      <button class="btn tertiary" aria-label="設定を開く"><span class="icon" aria-hidden="true">⚙</span>設定</button>
    </div>
  </div>
</div>

</body>
</html>
