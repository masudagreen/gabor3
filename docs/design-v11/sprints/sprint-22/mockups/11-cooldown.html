<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>S22-COOLDOWN — F-15 クールダウン (カウントダウン UI 統一)</title>
<style>
  :root {
    --bg-canvas: #0F1115;
    --bg-surface: #1A1D24;
    --fg-primary: #FFFFFF;
    --fg-secondary: #DCE0E8;
    --fg-muted: #B7BCC9;
    --countdown-normal: #FFFFFF;
    --countdown-warn: #FFD600;
    --countdown-danger: #FF8A82;     /* v1.2 amendment */
    --action-secondary: #2A2D34;
    --border-default: #3A3F4A;
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-canvas);
    color: var(--fg-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    -webkit-font-smoothing: antialiased;
    box-sizing: border-box;
  }
  *, *::before, *::after { box-sizing: inherit; }
  .device {
    max-width: 375px; width: 100%; min-height: 667px;
    margin: 24px auto;
    background: var(--bg-canvas);
    border-radius: 32px; overflow: hidden;
    border: 1px solid #2A2D34;
  }
  .inner {
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
    min-height: 667px;
    display: flex; flex-direction: column;
  }
  .topbar {
    display: flex; align-items: center; justify-content: flex-start;
    padding: 16px 0;
    color: var(--fg-secondary);
    font-size: 18px;
  }
  .back-btn {
    width: 48px; height: 48px;
    background: transparent; border: none; color: var(--fg-primary);
    font-size: 24px;
  }
  .content {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    gap: 24px;
  }
  .headline {
    font-size: 30px; font-weight: 700;
    margin: 0;
  }
  .body {
    font-size: 22px;
    color: var(--fg-secondary);
    margin: 0;
  }
  .illustration {
    width: 200px; height: 120px; max-width: 80%;
    background: var(--bg-surface);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    color: var(--fg-muted);
    font-size: 16px;
  }
  .countdown {
    font-size: 72px; font-weight: 700;       /* normal: Bold 700 */
    font-variant-numeric: tabular-nums;
    color: var(--countdown-normal);
    line-height: 1; letter-spacing: -0.04em;
    background: var(--bg-surface);
    border-radius: 24px;
    padding: 24px 40px;
    min-width: 120px;
  }
  .countdown.warn   { color: var(--countdown-warn);   font-weight: 700; }
  .countdown.danger { color: var(--countdown-danger); font-weight: 900; }
  .skip-btn {
    width: 100%; height: 64px; max-width: 343px;
    background: transparent;
    border: none;
    color: var(--fg-secondary);
    font-size: 22px; font-weight: 500;
    text-decoration: underline;
    cursor: pointer;
    margin-top: 24px;
  }
  .skip-btn:focus-visible {
    outline: 3px solid #FFFFFF;
    outline-offset: 2px;
  }
  .label-pc {
    text-align: center; color: var(--fg-muted); font-size: 14px; margin: 16px 24px;
  }
  .row { display: flex; gap: 16px; align-items: center; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
  .row .countdown { font-size: 48px; padding: 12px 20px; min-width: 80px; }
</style>
</head>
<body>

<div class="label-pc">S22-COOLDOWN — F-15 クールダウン 10 秒（CountdownTimer xl 適用 / 段階色：白→黄→赤）</div>
<div class="device" role="region" aria-label="クールダウン画面">
  <div class="inner">
    <div class="topbar">
      <button class="back-btn" aria-label="戻る">←</button>
      <span>クールダウン</span>
    </div>
    <div class="content">
      <h1 class="headline">おつかれさまでした</h1>
      <p class="body">10 秒間 遠くを見ましょう</p>
      <div class="illustration" aria-hidden="true">cooldown.svg</div>
      <div class="countdown" role="timer" aria-live="polite" aria-label="残り 8 秒">8</div>
      <div class="row" aria-hidden="true">
        <div class="countdown normal">8</div>
        <div class="countdown warn">5</div>
        <div class="countdown danger">3</div>
      </div>
      <button class="skip-btn" aria-label="クールダウンをスキップ">スキップ</button>
    </div>
  </div>
</div>

<div style="text-align:center; color:#B7BCC9; font-size:14px; max-width:600px; margin:16px auto; padding: 0 24px;">
  <strong>v1.2 改訂点：</strong> カウントダウン UI を CountdownTimer (CD-1) に統一（size=xl 72px、tabular-nums、点滅禁止、太字補強）。0 到達時に「ゲーム終了音」発火（F-19、設定で OFF 可能）。下段の 8 / 5 / 3 は段階色サンプル（実際は中央 1 個のみ表示）。
</div>

</body>
</html>
