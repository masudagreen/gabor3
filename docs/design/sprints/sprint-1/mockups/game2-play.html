<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Game 2 Play (Sprint 1, amendment) — 左右並び 5 秒同時提示</title>
<style>
  /* 2026-04-29 amendment：
     - Game 2 を「左右並び 5 秒同時提示型 2AFC」に変更
     - 点滅・マスク廃止、設問は「どちらが時計回りに傾いていますか？」
     - 左右ボタンは「左 / 右」になる
     - OPT-1 床（24px）、ボタン文字 26px は維持 */
  :root {
    --bg-canvas: #FAFAFA;
    --bg-surface: #FFFFFF;
    --gabor-bg: #808080;
    --fg-primary: #0E0F12;
    --fg-secondary: #4A4F5A;
    --action-primary: #13449D;
    --action-primary-hover: #0F3580;
    --action-secondary: #FFFFFF;
    --on-primary: #FFFFFF;
    --border-default: #E3E5EA;
    --focus-ring: #13449D;
    --highlight-correct: #FFC53D;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-canvas: #000000;
      --bg-surface: #15171C;
      --fg-primary: #F5F6F8;
      --fg-secondary: #B6BAC2;
      --action-primary: #7FB0FF;
      --action-primary-hover: #A6CBFF;
      --action-secondary: #1F2229;
      --on-primary: #000000;
      --border-default: #2B2F39;
      --focus-ring: #7FB0FF;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    background: var(--bg-canvas);
    color: var(--fg-primary);
    font-size: 24px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  .game-status-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-default);
    min-height: 64px;
    background: var(--bg-surface);
  }
  .icon-btn {
    width: 48px; height: 48px;
    background: transparent; border: none;
    color: var(--fg-primary);
    font-size: 28px;
    cursor: pointer;
  }
  .icon-btn:focus-visible { outline: 3px solid var(--focus-ring); outline-offset: 2px; }
  .countdown {
    font-size: 30px; font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .trial-counter {
    font-size: 24px; color: var(--fg-secondary);
  }

  /* ガボール領域：左右並び（横並び固定、点滅なし、5 秒間連続表示） */
  .gabor-area {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px;
  }
  .gabor-pair {
    display: flex; flex-direction: row; align-items: center; justify-content: center;
    gap: 24px;
  }
  .gabor-frame {
    width: 140px; height: 140px;
    background: var(--gabor-bg);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  /* 模擬ガボール（CSS グラデーションで縞を表現） */
  .gabor-patch {
    width: 110px; height: 110px;
    border-radius: 50%;
    background: repeating-linear-gradient(
      var(--orientation, 30deg),
      rgba(0,0,0,0.3) 0px,
      rgba(0,0,0,0.3) 8px,
      rgba(255,255,255,0.3) 8px,
      rgba(255,255,255,0.3) 16px
    );
    mask: radial-gradient(circle, black 30%, transparent 70%);
    -webkit-mask: radial-gradient(circle, black 30%, transparent 70%);
  }

  .answer-section {
    padding: 16px;
    border-top: 1px solid var(--border-default);
    background: var(--bg-surface);
  }
  .answer-prompt {
    text-align: center;
    font-size: 24px;
    color: var(--fg-primary);
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .answer-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .btn {
    min-height: 64px;
    border-radius: 16px;
    border: 1px solid var(--border-default);
    background: var(--action-secondary);
    color: var(--fg-primary);
    font-size: 26px;
    font-weight: 600;
    cursor: pointer;
    padding: 12px 16px;
  }
  .btn:focus-visible { outline: 3px solid var(--focus-ring); outline-offset: 2px; }
  .btn:hover { border-color: var(--action-primary); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  @media (min-width: 600px) {
    .gabor-frame { width: 200px; height: 200px; }
    .gabor-patch { width: 160px; height: 160px; }
    .gabor-pair { gap: 32px; }
    .answer-buttons { max-width: 720px; margin: 0 auto; }
  }
</style>
</head>
<body>
  <div class="game-status-bar">
    <button class="icon-btn" aria-label="ゲームを中断">✕</button>
    <div class="countdown" aria-live="off">残り 47 秒</div>
    <div class="trial-counter" aria-label="現在 1 / 30 試行">1 / 30 試行</div>
  </div>

  <div class="gabor-area">
    <div class="gabor-pair" aria-label="左右に並んだ縞模様 2 つ">
      <div class="gabor-frame" role="img" aria-label="左の縞模様">
        <div class="gabor-patch" style="--orientation: 33deg"></div>
      </div>
      <div class="gabor-frame" role="img" aria-label="右の縞模様">
        <div class="gabor-patch" style="--orientation: 27deg"></div>
      </div>
    </div>
  </div>

  <div class="answer-section">
    <div class="answer-prompt" aria-live="polite">どちらが時計回りに傾いていますか？</div>
    <div class="answer-buttons">
      <button class="btn" aria-label="左の縞模様が時計回りに傾いている">
        ← 左
      </button>
      <button class="btn" aria-label="右の縞模様が時計回りに傾いている">
        右 →
      </button>
    </div>
  </div>
</body>
</html>
