<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Game 3 Play (Sprint 3 mockup) — Round 3</title>
<style>
  /* Round 3 修正：
     - clock-btn フォントサイズ 16px → 24px（OPT-1 床、=18pt）
     - clock-btn サイズ 56×56 → 72×72px（24px ラベル収容＋ OPT-2）
     - clock 領域全体を 280 → 320px に拡大して 8 個のボタンが重ならないよう配置
     - patch.odd クラス → patch のみに統一（DOM 上で正解を判別不能に、Minor-1）
       odd one の表現は CSS の :nth-child を使わず、ランダム順の 1 つのパッチに別の orientation を「style 属性で直接」与える方式
       本モックは静的なので「すべて同じ class、style だけが違う」状態にする
     - guide text は screens.md S3-01 と整合：「『ちがう向き』のパッチはどの方向？」（Minor-2）
     - color tokens を 7:1 準拠に */
  :root {
    --bg-canvas: #FAFAFA;
    --bg-surface: #FFFFFF;
    --gabor-bg: #808080;
    --fg-primary: #0E0F12;
    --fg-secondary: #4A4F5A;
    --action-primary: #13449D;
    --action-secondary: #FFFFFF;
    --border-default: #E3E5EA;
    --focus-ring: #13449D;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-canvas: #000000;
      --bg-surface: #15171C;
      --fg-primary: #F5F6F8;
      --fg-secondary: #B6BAC2;
      --action-primary: #7FB0FF;
      --action-secondary: #1F2229;
      --border-default: #2B2F39;
      --focus-ring: #7FB0FF;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    background: var(--bg-canvas);
    color: var(--fg-primary);
    /* Round 3: OPT-1 床 24px */
    font-size: 24px;
    line-height: 1.6;
  }
  .game-status-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-default);
    /* Round 3: 30px の countdown が収まる高さ */
    min-height: 64px;
  }
  .icon-btn {
    width: 48px; height: 48px;
    background: transparent; border: none;
    color: var(--fg-primary); font-size: 28px; cursor: pointer;
  }
  .icon-btn:focus-visible { outline: 3px solid var(--focus-ring); outline-offset: 2px; }
  .countdown {
    /* OPT-7：タイムアウト・カウントダウン表示は font.h2 = 30px */
    font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums;
  }
  .trial-counter {
    /* font.body 24px */
    font-size: 24px; color: var(--fg-secondary);
  }

  .gabor-section {
    padding: 16px;
    display: flex; justify-content: center;
  }
  /* Round 3: スマホでは 280px、PC で 400px */
  .gabor-frame {
    width: 280px; height: 280px;
    background: var(--gabor-bg);
    border-radius: 8px;
    position: relative;
  }
  /* 8 個のパッチを円周に配置（疑似）。
     Round 3：すべて同じ class="patch" で統一（odd を DOM 上判別不能に）。
     odd one は style 属性の background の角度だけが異なる */
  .patch {
    position: absolute;
    width: 48px; height: 48px;
    border-radius: 50%;
    /* デフォルト 0deg（水平縞） */
    background: repeating-linear-gradient(
      var(--orientation, 0deg),
      rgba(0,0,0,0.3) 0px,
      rgba(0,0,0,0.3) 4px,
      rgba(255,255,255,0.3) 4px,
      rgba(255,255,255,0.3) 8px
    );
    mask: radial-gradient(circle, black 40%, transparent 80%);
    -webkit-mask: radial-gradient(circle, black 40%, transparent 80%);
    transform: translate(-50%, -50%);
  }
  .fixation {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 12px; height: 12px;
    pointer-events: none;
  }
  .fixation::before, .fixation::after {
    content: "";
    position: absolute;
    background: #000;
  }
  .fixation::before {
    left: 50%; top: 0; width: 2px; height: 100%;
    transform: translateX(-50%);
  }
  .fixation::after {
    top: 50%; left: 0; height: 2px; width: 100%;
    transform: translateY(-50%);
  }

  .answer-prompt {
    text-align: center;
    /* Round 3: font.body 24px */
    font-size: 24px;
    color: var(--fg-secondary);
    margin: 16px;
    line-height: 1.5;
  }
  /* Round 3: clock 領域を 320px に拡大（8 個の 72px ボタンが重ならないため） */
  .clock {
    width: 320px; height: 320px;
    margin: 0 auto 24px;
    position: relative;
  }
  .clock-btn {
    position: absolute;
    /* Round 3: 72×72px（OPT-2 タップ領域＋ 24px ラベル収容） */
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 1px solid var(--border-default);
    background: var(--action-secondary);
    color: var(--fg-primary);
    /* Round 3: font.body 24px Medium（=18pt、OPT-1 床） */
    font-size: 24px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    cursor: pointer;
    transform: translate(-50%, -50%);
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .clock-btn:focus-visible { outline: 3px solid var(--focus-ring); outline-offset: 2px; }
  .clock-btn:hover { border-color: var(--action-primary); }

  /* PC 横レイアウト：ガボールと clock を横並び */
  @media (min-width: 900px) {
    .play-area { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 1024px; margin: 0 auto; align-items: center; padding: 24px; }
    .gabor-section { padding: 24px; }
    .gabor-frame { width: 400px; height: 400px; }
    .patch { width: 56px; height: 56px; }
    .clock { width: 360px; height: 360px; }
  }

  /* スマホ 360px 以下：clock 領域は viewport 幅に収まるよう調整（既定 320px は 360px 以下でも入る） */
  @media (max-width: 359px) {
    .clock { width: 300px; height: 300px; }
    .clock-btn { width: 64px; height: 64px; font-size: 24px; }
  }
</style>
</head>
<body>
  <div class="game-status-bar">
    <button class="icon-btn" aria-label="ゲームを中断">✕</button>
    <div class="countdown" aria-live="off">残り 47 秒</div>
    <div class="trial-counter" aria-label="現在 18 / 40 試行">18 / 40</div>
  </div>

  <div class="play-area">
    <div class="gabor-section">
      <div class="gabor-frame" role="img" aria-label="周辺視野ハント、中心に固視点があります">
        <!-- Round 3：すべて class="patch" で統一。odd one は style の --orientation だけ異なる。
             DOM 上では「7 個が 0deg、1 個が 30deg」だが、class / data-attribute / aria は完全に等価で、
             スクリーンリーダー・JS Inspector のどちらからも正解を判別できない。
             実装時は orientation を staircase 値に応じて生成する -->
        <div class="patch" style="left:50%; top: 18%;"></div>
        <div class="patch" style="left:73%; top:27%; --orientation: 30deg;"></div>
        <div class="patch" style="left:82%; top:50%;"></div>
        <div class="patch" style="left:73%; top:73%;"></div>
        <div class="patch" style="left:50%; top:82%;"></div>
        <div class="patch" style="left:27%; top:73%;"></div>
        <div class="patch" style="left:18%; top:50%;"></div>
        <div class="patch" style="left:27%; top:27%;"></div>
        <div class="fixation" aria-hidden="true"></div>
      </div>
    </div>

    <div>
      <!-- Round 3 (Minor-2): screens.md と整合、spec.md §11.2 OPT-6 に従い日常語の問いかけ -->
      <div class="answer-prompt">「ちがう向き」のパッチはどの方向？</div>
      <div class="clock" role="group" aria-label="時計の方向ボタン 8 個">
        <button class="clock-btn" style="left:50%; top:8%;" aria-label="12 時の方向">12</button>
        <button class="clock-btn" style="left:80%; top:20%;" aria-label="1 時 30 分の方向">1:30</button>
        <button class="clock-btn" style="left:92%; top:50%;" aria-label="3 時の方向">3</button>
        <button class="clock-btn" style="left:80%; top:80%;" aria-label="4 時 30 分の方向">4:30</button>
        <button class="clock-btn" style="left:50%; top:92%;" aria-label="6 時の方向">6</button>
        <button class="clock-btn" style="left:20%; top:80%;" aria-label="7 時 30 分の方向">7:30</button>
        <button class="clock-btn" style="left:8%; top:50%;" aria-label="9 時の方向">9</button>
        <button class="clock-btn" style="left:20%; top:20%;" aria-label="10 時 30 分の方向">10:30</button>
      </div>
    </div>
  </div>
</body>
</html>
