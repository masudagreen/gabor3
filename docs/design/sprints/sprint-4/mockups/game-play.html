<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GaborEye v2.0 — ゲームプレイ中（モック）</title>
<style>
  :root{
    --gabor-bg:#808080;
    --surface:#15171C;
    --countdown-warn:#FFD600;
    --countdown-danger:#FF8A82;
    --sel:rgba(235,238,242,0.90);
    --tab-active:#7FB0FF;
    --tab-inactive:#9CA3AD;
    --tab-surface:#15171C;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--gabor-bg);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;
    color:#fff;display:flex;justify-content:center;
  }
  .device{width:100%;max-width:412px;min-height:100vh;position:relative;display:flex;flex-direction:column;}
  /* top bar - safe area inset simulated 44px */
  .statusbar{height:44px;background:var(--gabor-bg);}
  /* Opaque countdown bar: 7:1 contrast must NOT depend on the gabor stripes behind it.
     The bar background is fully opaque surface (#15171C). On this surface:
       white #FFFFFF = 17.93:1, warn #FFD600 = 12.70:1, danger #FF8A82 = 7.86:1 (all AAA). */
  .topbar{
    height:64px;display:flex;align-items:center;justify-content:center;position:relative;
    background:var(--surface);
  }
  .x-btn{position:absolute;left:8px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;
    font-size:30px;color:#fff;background:none;border:none;border-radius:8px;cursor:pointer;}
  .x-btn:focus-visible{outline:3px solid var(--tab-active);outline-offset:2px;}
  /* Opaque pill behind the countdown (defense in depth): guarantees the 7:1 floor
     even if the bar surface is ever altered. Same opaque surface color as the bar. */
  .countdown{font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;color:#fff;
    background:var(--surface);padding:2px 14px;border-radius:9999px;}
  .countdown.warn{color:var(--countdown-warn);}
  .countdown.danger{color:var(--countdown-danger);font-weight:900;}
  /* grid */
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:16px;}
  .grid{display:grid;gap:6px;}
  .cell{position:relative;border-radius:8px;border:2px solid transparent;cursor:pointer;overflow:hidden;background:var(--gabor-bg);}
  .cell.selected{border-color:var(--sel);}
  .cell:focus-visible{outline:3px solid var(--tab-active);outline-offset:2px;}
  .cell canvas{display:block;width:100%;height:100%;}
  /* confirm button (mode 2) */
  .confirm{min-height:64px;padding:0 40px;border-radius:12px;border:none;background:#7FB0FF;color:#000;
    font-size:26px;font-weight:700;cursor:pointer;}
  .confirm:focus-visible{outline:3px solid #fff;outline-offset:2px;}
  /* bottom tabs */
  .tabs{display:flex;background:var(--tab-surface);border-top:1px solid #2B2F39;padding-bottom:env(safe-area-inset-bottom,16px);}
  .tab{flex:1;min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    background:none;border:none;color:var(--tab-inactive);font-size:18px;font-weight:500;cursor:pointer;position:relative;}
  .tab.active{color:var(--tab-active);font-weight:700;}
  .tab.active::before{content:"";position:absolute;top:0;left:20%;right:20%;height:3px;background:var(--tab-active);}
  .tab .ic{font-size:24px;}
  .hint{position:fixed;top:8px;right:8px;font-size:12px;background:#000a;padding:4px 8px;border-radius:6px;}
</style>
</head>
<body>
<div class="hint" id="modeHint">方式②（確定ボタンあり）</div>
<div class="device" role="application" aria-label="ゲームプレイ画面">
  <div class="statusbar" aria-hidden="true"></div>
  <div class="topbar">
    <button class="x-btn" aria-label="ゲームを中断">✕</button>
    <span class="countdown" id="cd" aria-live="polite">18</span>
  </div>
  <div class="stage">
    <div class="grid" id="grid" role="group" aria-label="変化しているパッチをすべて選んでください"></div>
    <button class="confirm" id="confirm" aria-label="回答を確定する">確定</button>
  </div>
  <nav class="tabs" role="tablist" aria-label="メインナビゲーション">
    <button class="tab active" role="tab" aria-selected="true"><span class="ic">●</span>ホーム</button>
    <button class="tab" role="tab" aria-selected="false"><span class="ic">▢</span>履歴</button>
    <button class="tab" role="tab" aria-selected="false"><span class="ic">⚙</span>設定</button>
  </nav>
</div>
<script>
const N = 4;                 // grid size
const cellPx = Math.floor((Math.min(412,window.innerWidth) - 32 - (N-1)*6) / N);
const grid = document.getElementById('grid');
grid.style.gridTemplateColumns = `repeat(${N}, ${cellPx}px)`;

// each cell: gabor patch. some animate (rotation/sf change), some static.
const cells = [];
const changing = new Set([1, 7, 14]); // indices that "change"
for(let i=0;i<N*N;i++){
  const cell = document.createElement('button');
  cell.className='cell';
  cell.style.width=cellPx+'px';cell.style.height=cellPx+'px';
  cell.setAttribute('role','checkbox');
  cell.setAttribute('aria-checked','false');
  cell.setAttribute('aria-label',`パッチ ${Math.floor(i/N)+1}-${i%N+1}`);
  const cv=document.createElement('canvas');
  const dpr=window.devicePixelRatio||1;
  cv.width=cellPx*dpr;cv.height=cellPx*dpr;
  cell.appendChild(cv);
  cell.addEventListener('click',()=>{
    const sel=cell.classList.toggle('selected');
    cell.setAttribute('aria-checked',sel?'true':'false');
  });
  grid.appendChild(cell);
  cells.push({el:cell,cv,ctx:cv.getContext('2d'),
    angle:Math.random()*Math.PI,           // initial orientation
    sf:0.10+Math.random()*0.06,            // initial spatial frequency (cycles/px)
    rotates:changing.has(i)&&Math.random()<0.6,
    sfChanges:changing.has(i)&&Math.random()<0.6,
    rotDir:Math.random()<0.5?1:-1,
    sfDir:Math.random()<0.5?1:-1,
    size:cellPx*dpr});
}
// ensure each changing cell does at least one thing
changing.forEach(i=>{if(!cells[i].rotates&&!cells[i].sfChanges)cells[i].rotates=true;});

function drawGabor(c){
  const ctx=c.ctx,s=c.size,img=ctx.createImageData(s,s);
  const cx=s/2,cy=s/2,sigma=s*0.30; // gaussian window (generated at 1.5x effectively via sigma)
  const ca=Math.cos(c.angle),sa=Math.sin(c.angle);
  for(let y=0;y<s;y++){
    for(let x=0;x<s;x++){
      const dx=x-cx,dy=y-cy;
      const xr=dx*ca+dy*sa;
      const g=Math.exp(-(dx*dx+dy*dy)/(2*sigma*sigma));
      const wave=Math.sin(xr*c.sf*2*Math.PI);
      const lum=128+wave*g*127;
      const idx=(y*s+x)*4;
      img.data[idx]=img.data[idx+1]=img.data[idx+2]=lum;img.data[idx+3]=255;
    }
  }
  ctx.putImageData(img,0,0);
}
let last=performance.now();
function frame(now){
  const dt=(now-last)/1000;last=now;
  for(const c of cells){
    if(c.rotates)c.angle+=c.rotDir*(6*Math.PI/180)*dt;       // 6 deg/sec
    if(c.sfChanges){c.sf+=c.sfDir*0.004*dt; if(c.sf<0.05||c.sf>0.18)c.sfDir*=-1;}
    drawGabor(c);
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// countdown demo
let t=18;const cd=document.getElementById('cd');
setInterval(()=>{t=t>0?t-1:18;cd.textContent=t;
  cd.className='countdown'+(t<=3?' danger':t<=5?' warn':'');
  cd.setAttribute('aria-live',t<=5?'assertive':'polite');},1000);
</script>
</body>
</html>
