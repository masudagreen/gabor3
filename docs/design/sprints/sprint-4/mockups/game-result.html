<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GaborEye v2.0 — 結果開示オーバーレイ（モック）</title>
<style>
  :root{--gabor-bg:#808080;--overlayBg:rgba(20,24,32,0.82);
    --tp:#3FCB7E;--fp:#FF6E73;--aggOk:#3FCB7E;--aggNg:#FF6E73;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:var(--gabor-bg);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;color:#fff;display:flex;justify-content:center;}
  .device{width:100%;max-width:412px;min-height:100vh;display:flex;flex-direction:column;}
  .statusbar{height:44px;}
  .topbar{height:64px;display:flex;align-items:center;justify-content:center;position:relative;background:rgba(21,23,28,0.55);}
  .x-btn{position:absolute;left:8px;width:48px;height:48px;font-size:30px;color:#fff;background:none;border:none;}
  .countdown{font-size:30px;font-weight:900;font-variant-numeric:tabular-nums;color:#FF8A82;}
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:16px;}
  .grid{display:grid;gap:6px;}
  .cell{position:relative;border-radius:8px;overflow:hidden;background:var(--gabor-bg);}
  .cell canvas{display:block;width:100%;height:100%;}
  .mark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:55%;aspect-ratio:1;border-radius:50%;background:var(--overlayBg);
    display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:900;}
  .mark.tp{color:var(--tp);}
  .mark.fn{color:var(--tp);opacity:0.5;}      /* 選び逃し：薄い✅ */
  .mark.fp{color:var(--fp);}
  .agg{min-width:56px;height:56px;border-radius:9999px;display:flex;align-items:center;justify-content:center;
    font-size:34px;font-weight:900;padding:0 18px;}
  .agg.ok{background:var(--aggOk);color:#000;}
  .agg.ng{background:var(--aggNg);color:#000;}
  .tabs{display:flex;background:#15171C;border-top:1px solid #2B2F39;padding-bottom:env(safe-area-inset-bottom,16px);}
  .tab{flex:1;min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    background:none;border:none;color:#9CA3AD;font-size:18px;}
  .tab.active{color:#7FB0FF;font-weight:700;position:relative;}
  .tab.active::before{content:"";position:absolute;top:0;left:20%;right:20%;height:3px;background:#7FB0FF;}
  .hint{position:fixed;top:8px;right:8px;font-size:12px;background:#000a;padding:4px 8px;border-radius:6px;}
</style>
</head>
<body>
<div class="hint">結果開示（採点後・遷移なし）</div>
<div class="device">
  <div class="statusbar"></div>
  <div class="topbar"><button class="x-btn" aria-label="ゲームを中断">✕</button><span class="countdown">0</span></div>
  <div class="stage">
    <div class="grid" id="grid" role="group" aria-label="結果"></div>
    <div class="agg ok" role="img" aria-label="正解">✓</div>
  </div>
  <nav class="tabs" role="tablist">
    <button class="tab active" role="tab" aria-selected="true">● ホーム</button>
    <button class="tab" role="tab">▢ 履歴</button>
    <button class="tab" role="tab">⚙ 設定</button>
  </nav>
</div>
<script>
const N=4;const cellPx=Math.floor((Math.min(412,window.innerWidth)-32-(N-1)*6)/N);
const grid=document.getElementById('grid');grid.style.gridTemplateColumns=`repeat(${N},${cellPx}px)`;
// result map: index -> 'tp' (correctly selected changing), 'fn' (missed changing), 'fp' (wrongly selected static)
const result={1:'tp',5:'fp',6:'fn',14:'tp'};
const dpr=window.devicePixelRatio||1;
for(let i=0;i<N*N;i++){
  const cell=document.createElement('div');cell.className='cell';
  cell.style.width=cellPx+'px';cell.style.height=cellPx+'px';
  const cv=document.createElement('canvas');cv.width=cellPx*dpr;cv.height=cellPx*dpr;
  cell.appendChild(cv);
  drawGabor(cv.getContext('2d'),cellPx*dpr,Math.random()*Math.PI,0.10+Math.random()*0.05);
  if(result[i]){
    const m=document.createElement('div');m.className='mark '+result[i];
    m.textContent=result[i]==='fp'?'✕':'✓';
    m.setAttribute('role','img');
    m.setAttribute('aria-label',result[i]==='tp'?'正解（選択済み）':result[i]==='fn'?'正解（選び逃し）':'不正解（誤選択）');
    cell.appendChild(m);
  }
  grid.appendChild(cell);
}
function drawGabor(ctx,s,angle,sf){
  const img=ctx.createImageData(s,s),cx=s/2,cy=s/2,sigma=s*0.30,ca=Math.cos(angle),sa=Math.sin(angle);
  for(let y=0;y<s;y++)for(let x=0;x<s;x++){
    const dx=x-cx,dy=y-cy,xr=dx*ca+dy*sa,g=Math.exp(-(dx*dx+dy*dy)/(2*sigma*sigma));
    const lum=128+Math.sin(xr*sf*2*Math.PI)*g*127,idx=(y*s+x)*4;
    img.data[idx]=img.data[idx+1]=img.data[idx+2]=lum;img.data[idx+3]=255;
  }
  ctx.putImageData(img,0,0);
}
</script>
</body>
</html>
