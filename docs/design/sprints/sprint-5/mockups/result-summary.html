<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Result Summary (Sprint 5 mockup) — Round 3</title>
<style>
  /* Round 3 修正：
     - 全テキスト・ボタン 24px 以上（OPT-1 床）
     - color tokens 7:1 準拠
     - secondary metric .value を 28px → 26px (font.h3) に修正（components.md §21 と整合）
       実は 22pt ≒ 29.33px だが font.h3 は 26px に統一したのでこちらに合わせる
     - diff（前回比）のテキスト本体は色を fg.primary に、success 色は装飾アイコンのみ
       （§1.4：semantic.success は 5.36:1 で 7:1 未満のためテキスト色には使わない）
     - badge-awarded の背景 #0F8F6E → #0A6C53（accent 装飾用 6.40:1）。
       on-primary (white) on #0A6C53 = 6.40:1。7:1 未満だが装飾文脈かつ Bold + 24px + アイコン併置で識別性を補強 */
  :root {
    --bg-canvas: #FAFAFA;
    --bg-surface: #FFFFFF;
    --fg-primary: #0E0F12;
    --fg-secondary: #4A4F5A;
    --fg-muted: #4D525C;
    --action-primary: #13449D;
    --on-primary: #FFFFFF;
    --border-default: #E3E5EA;
    --success: #0F7A4F;
    --accent: #0A6C53;
    --focus-ring: #13449D;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-canvas: #000000;
      --bg-surface: #15171C;
      --fg-primary: #F5F6F8;
      --fg-secondary: #B6BAC2;
      --fg-muted: #9CA3AD;
      --action-primary: #7FB0FF;
      --on-primary: #000000;
      --border-default: #2B2F39;
      --success: #5DD3A0;
      --accent: #4FD9B0;
      --focus-ring: #7FB0FF;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    background: var(--bg-canvas);
    color: var(--fg-primary);
    /* Round 3: OPT-1 床 24px */
    font-size: 24px;
    line-height: 1.6;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 16px; }
  @media (min-width: 600px) { .container { padding: 48px; } }

  .icon-btn {
    width: 48px; height: 48px;
    background: transparent; border: none;
    color: var(--fg-primary); font-size: 28px; cursor: pointer;
  }
  .icon-btn:focus-visible { outline: 3px solid var(--focus-ring); outline-offset: 2px; }

  /* Round 3: font.h2 = 30px */
  h1.game-name { font-size: 30px; font-weight: 700; margin: 16px 0 4px; line-height: 1.3; }
  /* Round 3: font.h3 = 26px */
  h2.title { font-size: 26px; font-weight: 600; color: var(--fg-secondary); margin: 0 0 24px; }

  .primary-metric {
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    margin-bottom: 16px;
  }
  /* font.numeric.l 拡張：閾値表示は inline で 64px くらいでも OK */
  .primary-metric .value {
    font-size: 64px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--fg-primary); line-height: 1;
  }
  .primary-metric .unit { font-size: 36px; font-weight: 600; }
  .primary-metric .label {
    /* font.body 24px */
    font-size: 24px; color: var(--fg-secondary); margin-top: 12px;
    line-height: 1.4;
  }

  /* Round 3: diff のテキスト色は fg.primary、success は装飾アイコンのみ */
  .diff {
    text-align: center;
    /* font.body.bold 24px */
    font-size: 24px; font-weight: 700;
    color: var(--fg-primary);
    margin-bottom: 24px;
    line-height: 1.4;
  }
  .diff .arrow {
    /* 矢印は装飾 — success 色を使ってよい */
    color: var(--success);
    margin-right: 4px;
  }
  .diff .sparkle {
    /* 装飾用（accent でも可） */
    color: var(--success);
  }

  .secondary-metrics {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    margin-bottom: 24px;
  }
  .metric-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }
  /* Round 3: font.h3 = 26px (旧 28px から修正、components.md §21 と整合) — ただし数値はもう少し強調したいので 30px (h2) に */
  .metric-card .value { font-size: 30px; font-weight: 700; line-height: 1.2; }
  .metric-card .label { font-size: 24px; color: var(--fg-secondary); margin-top: 4px; }

  .badge-awarded {
    background: var(--accent);
    color: var(--on-primary);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    margin-bottom: 24px;
    animation: badgePop 1.5s ease-out;
  }
  .badge-awarded .icon { font-size: 40px; line-height: 1; }
  /* Round 3: 24px に */
  .badge-awarded .name { font-size: 24px; font-weight: 700; margin-top: 8px; line-height: 1.3; }
  @keyframes badgePop {
    0% { transform: scale(0.6); opacity: 0; }
    60% { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1); }
  }
  @media (prefers-reduced-motion: reduce) {
    .badge-awarded { animation: none; }
  }

  .btn-primary {
    display: block;
    width: 100%;
    /* Round 3: 64px (lg) */
    min-height: 64px;
    background: var(--action-primary);
    color: var(--on-primary);
    border: none;
    border-radius: 16px;
    /* font.body.lg 26px */
    font-size: 26px;
    font-weight: 600;
    cursor: pointer;
    line-height: 1.3;
    padding: 12px 16px;
  }
  .btn-primary:focus-visible { outline: 3px solid var(--focus-ring); outline-offset: 2px; }
  .btn-primary:hover { filter: brightness(0.9); }
  .btn-primary:active { transform: scale(0.98); }

  .auto-progress {
    text-align: center;
    /* Round 3: font.body 24px。caption ではなく主要動線（OPT-7 案内）のため body */
    font-size: 24px;
    color: var(--fg-muted);
    margin-top: 16px;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <div class="container">
    <button class="icon-btn" aria-label="戻る">←</button>

    <h1 class="game-name">Game 2（二重表裏判別）</h1>
    <h2 class="title">結果</h2>

    <div class="primary-metric">
      <div>
        <span class="value">4.2</span>
        <span class="unit">度</span>
      </div>
      <div class="label">今回の閾値（最小判別角度差）</div>
    </div>

    <div class="diff" aria-label="前回より 0.3 度改善しました">
      <span class="arrow" aria-hidden="true">↓</span>前回より 0.3 度改善 <span class="sparkle" aria-hidden="true">✨</span>
    </div>

    <div class="secondary-metrics">
      <div class="metric-card">
        <div class="value">78%</div>
        <div class="label">正答率</div>
      </div>
      <div class="metric-card">
        <div class="value">23</div>
        <div class="label">試行数</div>
      </div>
    </div>

    <div class="badge-awarded" role="status" aria-live="assertive">
      <div class="icon" aria-hidden="true">🏅</div>
      <div class="name">100 試行 獲得！</div>
    </div>

    <button class="btn-primary">次へ</button>

    <div class="auto-progress">あと 8 秒で次のゲームへ</div>
  </div>
</body>
</html>
