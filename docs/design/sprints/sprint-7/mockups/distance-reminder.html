<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GaborEye v3.0 — 距離リマインド（モック）</title>
<style>
  :root{--canvas:#FAFAFA;--fg:#0E0F12;--fg2:#4A4F5A;--danger:#A11C16;}
  @media (prefers-color-scheme: dark){:root{--canvas:#000;--fg:#F5F6F8;--fg2:#9CA3AD;--danger:#FF8A82;}}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:var(--canvas);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;
    color:var(--fg);display:flex;justify-content:center;}
  .device{width:100%;max-width:412px;min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:env(safe-area-inset-top,44px) 24px env(safe-area-inset-bottom,24px);}
  .x-btn{align-self:flex-start;width:48px;height:48px;font-size:30px;color:var(--fg);background:none;border:none;border-radius:8px;cursor:pointer;}
  .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;text-align:center;}
  .headline{font-size:36px;font-weight:700;line-height:1.3;}
  .oneeye{font-size:26px;font-weight:500;color:var(--fg2);}
  .cd{font-size:72px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--danger);line-height:1;}
  .auto{font-size:24px;color:var(--fg2);}
</style>
</head>
<body>
<div class="device">
  <button class="x-btn" aria-label="中断">✕</button>
  <div class="center">
    <div class="headline">画面から 40cm<br>離れてください</div>
    <div class="oneeye">片目を覆ってください（任意）</div>
    <div class="cd" id="cd" aria-live="assertive">3</div>
    <div class="auto">3 秒後に自動で始まります</div>
  </div>
</div>
<script>
let t=3;const cd=document.getElementById('cd');
const iv=setInterval(()=>{t--;if(t<0)t=3;cd.textContent=t;},1000);
</script>
</body>
</html>
</content>
