<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GaborEye v2.0 — 履歴タブ（モック）</title>
<style>
  :root{--canvas:#FAFAFA;--surface:#fff;--fg:#0E0F12;--label:#4A4F5A;--primary:#13449D;--today:#A11C16;--flame:#7A3C00;--border:#E3E5EA;--tabact:#13449D;--tabin:#4A4F5A;}
  @media (prefers-color-scheme:dark){:root{--canvas:#000;--surface:#15171C;--fg:#F5F6F8;--label:#9CA3AD;--primary:#7FB0FF;--today:#FF8A82;--flame:#FFB266;--border:#2B2F39;--tabact:#7FB0FF;--tabin:#9CA3AD;}}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--canvas);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;display:flex;justify-content:center;}
  .device{width:100%;max-width:412px;min-height:100vh;display:flex;flex-direction:column;}
  .scroll{flex:1;overflow:auto;padding:env(safe-area-inset-top,44px) 16px 16px;}
  h1{font-size:36px;margin-bottom:16px;}
  h3{font-size:26px;font-weight:600;margin:16px 0 8px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
  svg{width:100%;height:200px;}
  .axis{font-size:18px;fill:var(--label);}
  .tiles{display:flex;gap:12px;margin-top:16px;}
  .tile{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
  .tile .num{font-size:48px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1;}
  .tile .lbl{font-size:24px;font-weight:500;color:var(--label);}
  .tile .num.flame{color:var(--flame);}
  .tabs{display:flex;background:var(--surface);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom,16px);}
  .tab{flex:1;min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:none;border:none;color:var(--tabin);font-size:18px;}
  .tab.active{color:var(--tabact);font-weight:700;position:relative;}
  .tab.active::before{content:"";position:absolute;top:0;left:20%;right:20%;height:3px;background:var(--tabact);}
</style>
</head>
<body>
<div class="device">
  <div class="scroll">
    <h1>履歴</h1>
    <h3>日次スコアの推移</h3>
    <div class="card">
      <svg viewBox="0 0 320 200" role="img" aria-label="過去 5 日の日次スコア。最新 5/30 は 86 点">
        <!-- axes -->
        <line x1="40" y1="10" x2="40" y2="160" stroke="var(--border)"/>
        <line x1="40" y1="160" x2="310" y2="160" stroke="var(--border)"/>
        <text class="axis" x="0" y="20">100</text>
        <text class="axis" x="10" y="90">50</text>
        <text class="axis" x="22" y="164">0</text>
        <!-- line -->
        <polyline fill="none" stroke="var(--primary)" stroke-width="3"
          points="55,120 120,110 175,80 230,90 295,40"/>
        <circle cx="55" cy="120" r="6" fill="var(--primary)"/>
        <circle cx="120" cy="110" r="6" fill="var(--primary)"/>
        <circle cx="175" cy="80" r="6" fill="var(--primary)"/>
        <circle cx="230" cy="90" r="6" fill="var(--primary)"/>
        <!-- today = diamond + red -->
        <rect x="289" y="34" width="12" height="12" fill="var(--today)" transform="rotate(45 295 40)"/>
        <text class="axis" x="45" y="185">5/24</text>
        <text class="axis" x="160" y="185">5/28</text>
        <text class="axis" x="270" y="185">5/30</text>
      </svg>
    </div>
    <div class="tiles">
      <div class="tile" aria-label="連続日数 5 日"><div class="num flame">🔥5</div><div class="lbl">連続日数</div></div>
      <div class="tile" aria-label="累計プレイ回数 37 回"><div class="num">37</div><div class="lbl">累計プレイ回数</div></div>
    </div>
    <h3>バッジ</h3>
    <div class="card" style="font-size:24px;color:var(--label)">（バッジ一覧は S8 / badges.html 参照）</div>
  </div>
  <nav class="tabs" role="tablist">
    <button class="tab" role="tab">● ホーム</button>
    <button class="tab active" role="tab" aria-selected="true">▢ 履歴</button>
    <button class="tab" role="tab">⚙ 設定</button>
  </nav>
</div>
</body>
</html>
