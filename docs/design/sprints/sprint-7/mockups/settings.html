<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>設定 (Sprint 7 mockup) — Round 3</title>
<style>
  /* Round 3 修正：
     - 全テキスト 24px 以上（OPT-1 床）
     - color tokens 7:1 準拠（action.primary #13449D, error #A11C16, fg.muted #4D525C）
     - list-item の subtitle のみ 20px（caption 扱い、補足のため許容）
     - list-item の minHeight を 72px に拡大（24px title + 20px subtitle が収まる） */
  :root {
    --bg-canvas: #FAFAFA;
    --bg-surface: #FFFFFF;
    --fg-primary: #0E0F12;
    --fg-secondary: #4A4F5A;
    --fg-muted: #4D525C;
    --action-primary: #13449D;
    --on-primary: #FFFFFF;
    --border-default: #E3E5EA;
    --error: #A11C16;
    --focus-ring: #13449D;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-canvas: #000000;
      --bg-surface: #15171C;
      --fg-primary: #F5F6F8;
      --fg-secondary: #B6BAC2;
      --fg-muted: #9CA3AD;
      --action-primary: #7FB0FF;
      --on-primary: #000000;
      --border-default: #2B2F39;
      --error: #FF8A82;
      --focus-ring: #7FB0FF;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    background: var(--bg-canvas);
    color: var(--fg-primary);
    /* Round 3: 24px 床 */
    font-size: 24px;
    line-height: 1.6;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 16px; }
  @media (min-width: 600px) { .container { padding: 48px; } }

  header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0;
  }
  .icon-btn {
    width: 48px; height: 48px;
    background: transparent; border: none;
    color: var(--fg-primary); font-size: 28px; cursor: pointer;
    border-radius: 12px;
  }
  .icon-btn:focus-visible { outline: 3px solid var(--focus-ring); outline-offset: 2px; }
  /* Round 3: font.h2 = 30px */
  header h1 { margin: 0; font-size: 30px; font-weight: 700; }

  .section-title {
    /* Round 3: font.body 24px */
    font-size: 24px;
    color: var(--fg-secondary);
    margin: 32px 0 8px;
    text-transform: none;
    font-weight: 500;
  }
  .list {
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: 12px;
    overflow: hidden;
  }
  .list-item {
    /* Round 3: 24px title + 20px subtitle が収まる高さに */
    min-height: 72px;
    display: flex; align-items: center;
    padding: 16px;
    border-bottom: 1px solid var(--border-default);
    cursor: pointer;
    color: var(--fg-primary);
    background: none; border-left: none; border-right: none; border-top: none;
    width: 100%;
    text-align: left;
    /* font.body 24px */
    font-size: 24px;
    gap: 8px;
  }
  .list-item:last-child { border-bottom: none; }
  .list-item:focus-visible { outline: 3px solid var(--focus-ring); outline-offset: -3px; }
  .list-item:hover { background: var(--border-default); }
  .list-item .icon { font-size: 28px; margin-right: 12px; line-height: 1; }
  .list-item .content { flex: 1; min-width: 0; }
  /* font.body 24px */
  .list-item .title { font-size: 24px; font-weight: 500; line-height: 1.3; }
  /* font.caption 20px（補足のみ、許容） */
  .list-item .subtitle { font-size: 20px; color: var(--fg-muted); line-height: 1.4; margin-top: 2px; }
  .list-item .trailing {
    font-size: 24px; color: var(--fg-secondary);
    display: inline-flex; align-items: center;
  }
  .list-item .chevron { color: var(--fg-muted); font-size: 24px; margin-left: 8px; }
  .list-item.destructive .icon, .list-item.destructive .title { color: var(--error); }

  .toggle {
    width: 48px; height: 28px;
    border-radius: 14px;
    background: #C9CDD4;
    position: relative;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--action-primary); }
  .toggle::after {
    content: "";
    position: absolute;
    top: 2px; left: 2px;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: white;
    transition: left 0.15s;
  }
  .toggle.on::after { left: 22px; }
  .toggle-label {
    margin-left: 8px;
    /* Round 3: 24px に */
    font-size: 24px;
    color: var(--fg-secondary);
    font-weight: 500;
    min-width: 36px;
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <button class="icon-btn" aria-label="戻る">←</button>
      <h1>設定</h1>
    </header>

    <div class="list">
      <button class="list-item" aria-label="効果音、ON">
        <div class="icon" aria-hidden="true">🔊</div>
        <div class="content">
          <div class="title">効果音</div>
          <div class="subtitle">ボタン操作などの音</div>
        </div>
        <div class="trailing"><div class="toggle on"></div></div>
        <span class="toggle-label">ON</span>
      </button>
      <button class="list-item" aria-label="振動、ON">
        <div class="icon" aria-hidden="true">📳</div>
        <div class="content">
          <div class="title">振動</div>
          <div class="subtitle">ハプティクス</div>
        </div>
        <div class="trailing"><div class="toggle on"></div></div>
        <span class="toggle-label">ON</span>
      </button>
      <button class="list-item">
        <div class="icon" aria-hidden="true">🌙</div>
        <div class="content">
          <div class="title">ダークモード</div>
        </div>
        <div class="trailing">OS 連動</div>
        <span class="chevron" aria-hidden="true">›</span>
      </button>
      <button class="list-item">
        <div class="icon" aria-hidden="true">📏</div>
        <div class="content">
          <div class="title">視聴距離</div>
        </div>
        <div class="trailing">40 cm</div>
        <span class="chevron" aria-hidden="true">›</span>
      </button>
      <button class="list-item">
        <div class="icon" aria-hidden="true">👁️</div>
        <div class="content">
          <div class="title">片眼ガイダンス</div>
        </div>
        <div class="trailing">OFF</div>
        <span class="chevron" aria-hidden="true">›</span>
      </button>
      <button class="list-item" aria-label="Game 3 リズム BGM、OFF">
        <div class="icon" aria-hidden="true">🎵</div>
        <div class="content">
          <div class="title">Game 3 リズム BGM</div>
        </div>
        <div class="trailing"><div class="toggle"></div></div>
        <span class="toggle-label">OFF</span>
      </button>
    </div>

    <div class="section-title">記録・データ</div>
    <div class="list">
      <button class="list-item">
        <div class="icon" aria-hidden="true">🏅</div>
        <div class="content">
          <div class="title">バッジ一覧</div>
        </div>
        <div class="trailing">3 / 8</div>
        <span class="chevron" aria-hidden="true">›</span>
      </button>
      <button class="list-item">
        <div class="icon" aria-hidden="true">🔄</div>
        <div class="content">
          <div class="title">難易度をリセット</div>
          <div class="subtitle">staircase 状態を初期化</div>
        </div>
        <span class="chevron" aria-hidden="true">›</span>
      </button>
      <button class="list-item destructive">
        <div class="icon" aria-hidden="true">🗑️</div>
        <div class="content">
          <div class="title">全データを削除</div>
        </div>
        <span class="chevron" aria-hidden="true">›</span>
      </button>
    </div>

    <div class="section-title">このアプリについて</div>
    <div class="list">
      <button class="list-item">
        <div class="icon" aria-hidden="true">📄</div>
        <div class="content">
          <div class="title">免責事項を読む</div>
        </div>
        <span class="chevron" aria-hidden="true">›</span>
      </button>
      <button class="list-item">
        <div class="icon" aria-hidden="true">ℹ️</div>
        <div class="content">
          <div class="title">バージョン情報</div>
        </div>
        <span class="chevron" aria-hidden="true">›</span>
      </button>
    </div>
  </div>
</body>
</html>
