<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GaborEye v2.0 — バッジ一覧（モック）</title>
<style>
  :root{--canvas:#FAFAFA;--surface:#fff;--fg:#0E0F12;--label:#4A4F5A;--border:#E3E5EA;}
  @media (prefers-color-scheme:dark){:root{--canvas:#000;--surface:#15171C;--fg:#F5F6F8;--label:#9CA3AD;--border:#2B2F39;}}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--canvas);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;display:flex;justify-content:center;}
  .device{width:100%;max-width:412px;padding:env(safe-area-inset-top,44px) 16px 24px;}
  h3{font-size:26px;margin:8px 0 16px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .cell{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
  .ic{font-size:44px;}
  .cell.locked .ic{filter:grayscale(1);opacity:0.55;}
  .name{font-size:24px;font-weight:700;margin-top:8px;}
  .date{font-size:20px;color:var(--label);margin-top:4px;}
  .hint{font-size:24px;color:var(--label);margin-top:6px;line-height:1.4;}
  .lock{font-size:20px;}
</style>
</head>
<body>
<div class="device">
  <h3>バッジ</h3>
  <div class="grid" role="list">
    <div class="cell" role="listitem" aria-label="はじめの一歩、獲得済み 2026-05-24">
      <div class="ic">🏅</div><div class="name">はじめの一歩</div><div class="date">2026-05-24</div></div>
    <div class="cell" role="listitem" aria-label="三日坊主突破、獲得済み 2026-05-26">
      <div class="ic">🏅</div><div class="name">三日坊主突破</div><div class="date">2026-05-26</div></div>
    <div class="cell locked" role="listitem" aria-label="一週間の習慣、未獲得：7 日連続でプレイすると獲得">
      <div class="ic">🏅</div><div class="name">一週間の習慣 <span class="lock">🔒</span></div><div class="hint">7 日連続でプレイすると獲得</div></div>
    <div class="cell locked" role="listitem" aria-label="達人の眼、未獲得：最も難しい設定で高得点で獲得">
      <div class="ic">🏅</div><div class="name">達人の眼 <span class="lock">🔒</span></div><div class="hint">最も難しい設定で高得点を出すと獲得</div></div>
    <div class="cell" role="listitem" aria-label="好調のしるし、獲得済み 2026-05-29">
      <div class="ic">🏅</div><div class="name">好調のしるし</div><div class="date">2026-05-29</div></div>
    <div class="cell locked" role="listitem" aria-label="パーフェクト、未獲得：スコア 100 を達成すると獲得">
      <div class="ic">🏅</div><div class="name">パーフェクト <span class="lock">🔒</span></div><div class="hint">スコア 100 を達成すると獲得</div></div>
  </div>
</div>
</body>
</html>
