<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GaborEye v3.0 — 履歴（モック・到達レベル推移）</title>
<style>
  :root{--canvas:#FAFAFA;--surface:#FFFFFF;--fg:#0E0F12;--fg2:#4A4F5A;
    --level-line:#13449D;--highest-line:#7A4300;--today:#A11C16;--level-fg:#0E3A86;--streak:#7A3C00;
    --border:#E3E5EA;--tab-active:#13449D;--tab-inactive:#4A4F5A;}
  @media (prefers-color-scheme: dark){:root{--canvas:#000;--surface:#15171C;--fg:#F5F6F8;--fg2:#9CA3AD;
    --level-line:#7FB0FF;--highest-line:#FFB266;--today:#FF8A82;--level-fg:#A6CBFF;--streak:#FFB266;
    --border:#2B2F39;--tab-active:#7FB0FF;--tab-inactive:#9CA3AD;}}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{background:var(--canvas);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;
    color:var(--fg);display:flex;justify-content:center;}
  .device{width:100%;max-width:412px;min-height:100vh;display:flex;flex-direction:column;
    padding-top:env(safe-area-inset-top,44px);}
  .content{flex:1;overflow:auto;padding:16px;}
  h1{font-size:36px;font-weight:700;margin-bottom:16px;}
  h3{font-size:26px;font-weight:500;margin:8px 0 12px;}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:20px;}
  svg{width:100%;height:auto;display:block;}
  .axis-label{font-size:24px;fill:var(--fg2);}
  .legend{font-size:24px;color:var(--fg2);margin-top:8px;display:flex;gap:16px;flex-wrap:wrap;}
  .legend .sw{display:inline-block;width:16px;height:3px;vertical-align:middle;margin-right:4px;}
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .tile{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
  .tile .v{font-size:48px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1;}
  .tile.level .v{color:var(--level-fg);}
  .tile.streak .v{color:var(--streak);}
  .tile .l{font-size:24px;font-weight:500;color:var(--fg2);}
  .tile.wide{grid-column:1/3;}
  .tabs{display:flex;background:var(--surface);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom,16px);}
  .tab{flex:1;min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    background:none;border:none;color:var(--tab-inactive);font-size:24px;font-weight:500;position:relative;}
  .tab.active{color:var(--tab-active);font-weight:700;}
  .tab.active::before{content:"";position:absolute;top:0;left:20%;right:20%;height:3px;background:var(--tab-active);}
  .tab .ic{font-size:24px;}
</style>
</head>
<body>
<div class="device">
  <div class="content">
    <h1>履歴</h1>
    <h3>到達レベルの推移</h3>
    <div class="chart-card">
      <svg viewBox="0 0 340 200" role="img" aria-label="過去 8 日の到達レベル。最新 6/9 は レベル 23。最高到達レベル 25">
        <!-- y grid lines + labels (0,10,20,25 highest) -->
        <line x1="40" y1="170" x2="330" y2="170" stroke="var(--border)"/>
        <line x1="40" y1="120" x2="330" y2="120" stroke="var(--border)"/>
        <line x1="40" y1="70" x2="330" y2="70" stroke="var(--border)"/>
        <text class="axis-label" x="34" y="175" text-anchor="end">0</text>
        <text class="axis-label" x="34" y="125" text-anchor="end">10</text>
        <text class="axis-label" x="34" y="75" text-anchor="end">20</text>
        <!-- highest level dashed reference line at 25 -->
        <line x1="40" y1="45" x2="330" y2="45" stroke="var(--highest-line)" stroke-width="2" stroke-dasharray="6 4"/>
        <text class="axis-label" x="330" y="40" text-anchor="end" fill="var(--highest-line)">最高 25</text>
        <!-- daily reached level polyline: values 8,11,14,18,20,22,21,23 over 8 days -->
        <polyline fill="none" stroke="var(--level-line)" stroke-width="3"
          points="55,130 92,115 129,100 166,80 203,70 240,60 277,65 314,55"/>
        <!-- points (● other days) -->
        <circle cx="55" cy="130" r="5" fill="var(--level-line)"/>
        <circle cx="92" cy="115" r="5" fill="var(--level-line)"/>
        <circle cx="129" cy="100" r="5" fill="var(--level-line)"/>
        <circle cx="166" cy="80" r="5" fill="var(--level-line)"/>
        <circle cx="203" cy="70" r="5" fill="var(--level-line)"/>
        <circle cx="240" cy="60" r="5" fill="var(--level-line)"/>
        <circle cx="277" cy="65" r="5" fill="var(--level-line)"/>
        <!-- today point (◆ + red) -->
        <rect x="309" y="50" width="10" height="10" fill="var(--today)" transform="rotate(45 314 55)"/>
        <!-- x labels -->
        <text class="axis-label" x="55" y="192" text-anchor="middle">6/3</text>
        <text class="axis-label" x="129" y="192" text-anchor="middle">6/5</text>
        <text class="axis-label" x="203" y="192" text-anchor="middle">6/7</text>
        <text class="axis-label" x="314" y="192" text-anchor="middle">6/9</text>
      </svg>
      <div class="legend">
        <span><span class="sw" style="background:var(--level-line)"></span>日次到達レベル</span>
        <span><span class="sw" style="background:var(--highest-line)"></span>最高到達レベル</span>
        <span><span style="color:var(--today)">◆</span> 当日</span>
      </div>
    </div>
    <div class="tiles">
      <div class="tile level"><div class="v" aria-label="最高到達レベル 25">25</div><div class="l">最高到達レベル</div></div>
      <div class="tile"><div class="v" aria-label="累計プレイ回数 37 回">37</div><div class="l">累計プレイ回数</div></div>
      <div class="tile streak wide"><div class="v" aria-label="連続日数 5 日">🔥 5</div><div class="l">連続日数</div></div>
    </div>
    <h3>バッジ</h3>
    <div style="color:var(--fg2);font-size:18px;">（バッジ一覧は badges.html を参照）</div>
  </div>
  <nav class="tabs" role="tablist">
    <button class="tab" role="tab" aria-selected="false"><span class="ic">▢</span>ホーム</button>
    <button class="tab active" role="tab" aria-selected="true"><span class="ic">■</span>履歴</button>
    <button class="tab" role="tab" aria-selected="false"><span class="ic">⚙</span>設定</button>
  </nav>
</div>
</body>
</html>
</content>
